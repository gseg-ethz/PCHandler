# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    post_build:
      # Copy the repo-root LICENSE into the HTML output as LICENSE.txt so the
      # license badge in introduction.rst (:target: ./LICENSE.txt) resolves.
      # Was `mv html/LICENSE ...` which failed (Sphinx never copies LICENSE into
      # the output — no html_extra_path), breaking every RTD build at post_build.
      - cp LICENSE $READTHEDOCS_OUTPUT/html/LICENSE.txt

sphinx:
  configuration: docs/source/conf.py

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - doc
