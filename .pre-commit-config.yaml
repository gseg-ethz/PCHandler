repos:
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.4
    hooks:
      - id: insert-license
        name: Insert project banner into Python files
        files: ^src/.*\.(py|pyi)$
        exclude: ^(?:tests/|examples/|\.venv/|venv/|\.git/|build/|dist/|docs/_build/|\.mypy_cache/|\.pytest_cache/|\.ruff_cache/|\.tox/|\.eggs/|site-packages/)
        args:
          - --license-filepath=.license-header.txt
          - --comment-style=#
          - --use-current-year
          - --allow-past-years
          - --detect-license-in-X-top-lines=30

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.1
    hooks:
      - id: mypy
        args: ["--config-file", "mypy.ini"]
        pass_filenames: false
        # The pydantic.mypy plugin is loaded by mypy at startup (see mypy.ini
        # `plugins = pydantic.mypy`). mirrors-mypy runs in an isolated venv,
        # so plugin packages must be declared as additional_dependencies here.
        # GSEGUtils is intentionally omitted: the per-module `[mypy-pchandler.*]
        # ignore_errors` blocks already silence every site that consumes it,
        # and the git+ssh source cannot resolve in CI's isolated venv anyway.
        additional_dependencies:
          - "pydantic~=2.11"
          - "numpy>=2.0,<2.4"
          - "numpydantic~=1.6"

  - repo: local
    hooks:
      - id: pyright-informational
        name: pyright (informational, never blocks)
        entry: bash -c 'pyright "$@" || true' --
        language: system
        types: [python]
        require_serial: true
        pass_filenames: false
        verbose: true
