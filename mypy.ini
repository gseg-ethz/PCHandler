[mypy]
python_version = 3.12
mypy_path = src:./stubs
explicit_package_bases = True
namespace_packages = True
plugins = pydantic.mypy

files = src, tests

;mypy_path = src, ../41_pchandler/src

show_error_codes = true
pretty = true

# Warnings & strictness
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
strict = true

# If strictness is too much, disable and selectively enable:
# disallow_untyped_defs = true
# disallow_untyped_calls = true
# disallow_any_generics = true
# no_implicit_optional = true
# warn_return_any = true


# If you have other untyped deps, ignore them individually, but NOT pchandler
;[mypy-numpy.*]
;ignore_missing_imports = true

[mypy-joblib.*]
ignore_missing_imports = true

# Auto-generated at install time by setuptools_scm; not checked into git, so
# pre-commit mypy in CI (which runs before any install step) can't resolve the
# import in src/pchandler/__init__.pyi. Matches the `joblib`/`open3d`
# external-untyped pattern. Local dev hits this via `pip install -e .` writing
# _version.py to disk before mypy runs.
[mypy-pchandler._version]
ignore_missing_imports = true

# NOTE: `[mypy-GSEGUtils.*] ignore_missing_imports = true` was DROPPED in Plan
# 01-03b (D-11). pchandler now type-resolves against the SHA-pinned GSEGUtils
# install (see `pyproject.toml`). The per-module `ignore_errors` blocks below
# acknowledge the pre-existing mypy/numpydantic strict-mode incompatibility
# that Plan 01-03a surfaced and deferred to a follow-up FRAG/Phase 6 plan; see
# `.planning/phases/01-cross-repo-foundation/01-03b-SUMMARY.md` for the audit
# trail. These overrides are surgical (mirroring `[mypy-joblib.*]` /
# `[mypy-open3d.*]` upstream-untyped patterns) and silence whole modules whose
# only mypy errors are structural numpydantic NDArray[Shape, Dtype] issues
# (Variable "..." is not valid as a type; Shape[Any]; etc.). They are NOT
# lifting strict mode — every module not listed below still runs strict.

# Phase 6 DEBT-07: `pchandler.base_types` carries a TYPE_CHECKING-only import
# from GSEGUtils.base_types (Array_Nx3_T, VectorT, etc.) used as forward-ref
# types inside :class:`PointCloudDataKW`. The pre-commit mypy isolated venv
# deliberately omits GSEGUtils (see `.pre-commit-config.yaml` mirrors-mypy
# `additional_dependencies` comment), so the import-not-found is silenced
# here for that one upstream module only. Local dev with the SHA-pinned
# GSEGUtils install ignores this override and resolves the imports normally.
[mypy-GSEGUtils.base_types]
ignore_missing_imports = true

[mypy-pchandler.geometry.coordinates]
ignore_errors = true

[mypy-pchandler.geometry.optimal_shift]
ignore_errors = true

[mypy-pchandler.geometry.transforms]
ignore_errors = true

[mypy-pchandler.geometry.util]
ignore_errors = true

[mypy-pchandler.geometry.splitter]
ignore_errors = true

[mypy-pchandler.geometry.spherical.angle]
ignore_errors = true

[mypy-pchandler.geometry.spherical.fov]
ignore_errors = true

[mypy-pchandler.scalar_fields.scalar_field_manager]
ignore_errors = true

[mypy-pchandler.scalar_fields.scalar_fields]
ignore_errors = true

[mypy-pchandler.filters.core]
ignore_errors = true

[mypy-pchandler.filters.cartesian_filters]
ignore_errors = true

[mypy-pchandler.filters.spherical_coordinate_filters]
ignore_errors = true

[mypy-pchandler.filters.downsample]
ignore_errors = true

[mypy-pchandler.filters.outlier_filter]
ignore_errors = true

[mypy-pchandler.filters.scalar_field_filters]
ignore_errors = true

[mypy-pchandler._optional]
ignore_errors = true

[mypy-pchandler.filters.gpu]
ignore_errors = true

[mypy-pchandler.data_io.core]
ignore_errors = true

[mypy-pchandler.data_io.csv]
ignore_errors = true

[mypy-pchandler.data_io.e57]
ignore_errors = true

[mypy-pchandler.data_io.las]
ignore_errors = true

[mypy-pchandler.data_io.pcd]
ignore_errors = true

[mypy-pchandler.data_io.ply]
ignore_errors = true

[mypy-pchandler.data_io.util]
ignore_errors = true

[mypy-pchandler.core]
ignore_errors = true

# Auto-generated lazy-loader stubs by GSEGUtils.generate_init_stubs. The stubs
# use overloaded module-level `__getattr__` for IDE/pyright completion, but
# PEP 562 requires module-level `__getattr__` to have signature
# `(name: str) -> Any` for mypy. Pyright accepts the overload pattern; mypy
# does not. Tracked alongside the numpydantic deferral.
[mypy-pchandler]
ignore_errors = true

# Test modules exercise the same numpydantic surface and inherit the same
# strict-mode mypy/numpydantic incompatibility. Tracked for the same follow-up.
[mypy-tests.*]
ignore_errors = true
