name: Setup Python + deps (pchandler)
description: >
  Checkout, set up Python 3.12, restore pip cache, load GSEGUtils deploy key
  into ssh-agent, and install pchandler[dev]. Asymmetric variant: includes
  ssh-agent step that GSEGUtils's composite omits — pchandler consumes
  GSEGUtils via git+ssh, GSEGUtils has no cross-repo dep. See Phase 8
  CONTEXT.md Claude's Discretion §Composite action scope.

inputs:
  gsegutils-deploy-key:
    description: >
      SSH private key for cloning the private GSEGUtils repo via git+ssh.
      Caller passes ${{ secrets.GSEGUTILS_DEPLOY_KEY }}; GitHub auto-masks
      secret references.
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      with:
        ref: ${{ github.event_name == 'pull_request' && github.head_ref || '' }}
        token: ${{ github.token }}
        fetch-depth: 0

    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.12"

    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-3.12-${{ hashFiles('pyproject.toml') }}

    - uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555  # v0.10.0
      with:
        ssh-private-key: ${{ inputs.gsegutils-deploy-key }}

    - shell: bash
      run: pip install .[dev]
