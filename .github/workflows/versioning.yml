name: Versioning and Release

on:
  push:
    branches:
      - main

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV

      - name: Determine highest-priority version bump
        id: determine_bump
        run: |
          echo "Checking commit messages for version bumps..."
          MERGE_COMMITS=$(git log $(git merge-base HEAD origin/main)..HEAD --pretty=format:%s)
          BUMP_TYPE="patch"

          if echo "$MERGE_COMMITS" | grep -q "#major"; then
            BUMP_TYPE="major"
          elif echo "$MERGE_COMMITS" | grep -q "#minor"; then
            BUMP_TYPE="minor"
          fi

          echo "BUMP_TYPE=$BUMP_TYPE" >> $GITHUB_ENV
          echo "Version bump type selected: $BUMP_TYPE"

      - name: Bump version
        id: bump_version
        run: |
          OLD_VERSION=${LATEST_TAG//v/}
          MAJOR=$(echo $OLD_VERSION | cut -d. -f1)
          MINOR=$(echo $OLD_VERSION | cut -d. -f2)
          PATCH=$(echo $OLD_VERSION | cut -d. -f3)

          if [ "$BUMP_TYPE" = "major" ]; then
            NEW_VERSION="$((MAJOR + 1)).0.0"
          elif [ "$BUMP_TYPE" = "minor" ]; then
            NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
          else
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi

          echo "New Version: $NEW_VERSION"
          echo "NEW_TAG=v$NEW_VERSION" >> $GITHUB_ENV

      - name: Create new tag
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git tag $NEW_TAG
          git push origin $NEW_TAG

      - name: Handle pre-release versioning for feature branches
        if: github.ref != 'refs/heads/main'
        run: |
          DEV_VERSION="${LATEST_TAG//v/}-dev.$(date +%Y%m%d%H%M%S)"
          echo "DEV_VERSION=$DEV_VERSION" >> $GITHUB_ENV
          echo "Development version: $DEV_VERSION"

