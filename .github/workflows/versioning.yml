name: Versioning and Release

on:
  push:
    branches:
      - main

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch only latest commit for speed

      - name: Get latest tag
        id: get_version
        run: |
          echo "Fetching latest tag..."
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV

      - name: Determine if version bump should be skipped
        id: check_skip_version
        run: |
          echo "Checking commit messages for #skip-version..."
          LATEST_COMMIT=$(git log -1 --pretty=format:%s)

          if echo "$LATEST_COMMIT" | grep -Eiq "#skip-version"; then
            echo "Skipping version bump and squashing commits..."
            echo "SKIP_VERSION=true" >> $GITHUB_ENV
            exit 0
          fi
          echo "SKIP_VERSION=false" >> $GITHUB_ENV

      - name: Squash commits if #skip-version is present
        if: env.SKIP_VERSION == 'true'
        run: |
          echo "Finding last tagged commit..."
          LAST_TAG_COMMIT=$(git rev-list -n 1 $LATEST_TAG)

          echo "Resetting commits since last tag..."
          git reset --soft $LAST_TAG_COMMIT
          git commit -m "Squashed commits (skipped version bump)"

          echo "Force pushing squashed commit..."
          git push --force-with-lease origin main

          exit 0  # Exit early to prevent version bump

      - name: Determine highest-priority version bump
        if: env.SKIP_VERSION == 'false'
        id: determine_bump
        run: |
          echo "Checking commit messages for version bumps..."
          LATEST_COMMIT=$(git log -1 --pretty=format:%s)

          echo "Commit Message: $LATEST_COMMIT"

          BUMP_TYPE="patch"

          if echo "$LATEST_COMMIT" | grep -Eiq "#major"; then
            BUMP_TYPE="major"
          elif echo "$LATEST_COMMIT" | grep -Eiq "#minor"; then
            BUMP_TYPE="minor"
          fi

          echo "BUMP_TYPE=$BUMP_TYPE" >> $GITHUB_ENV
          echo "Version bump type selected: $BUMP_TYPE"

      - name: Bump version
        if: env.SKIP_VERSION == 'false'
        id: bump_version
        run: |
          OLD_VERSION=${LATEST_TAG//v/}
          echo "Old Version: $OLD_VERSION"

          MAJOR=$(echo $OLD_VERSION | cut -d. -f1)
          MINOR=$(echo $OLD_VERSION | cut -d. -f2)
          PATCH=$(echo $OLD_VERSION | cut -d. -f3)

          if [ "$BUMP_TYPE" = "major" ]; then
            NEW_VERSION="$((MAJOR + 1)).0.0"
          elif [ "$BUMP_TYPE" = "minor" ]; then
            NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
          else
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi

          echo "New Version: $NEW_VERSION"
          echo "NEW_TAG=v$NEW_VERSION" >> $GITHUB_ENV

      - name: Create new tag
        if: env.SKIP_VERSION == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git tag $NEW_TAG
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git $NEW_TAG
