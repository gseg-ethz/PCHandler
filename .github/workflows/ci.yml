name: CI

on:
  pull_request:
  push:
    branches: [main, develop/gsd]

jobs:
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          # On PRs, check out the head branch so pushes work
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || '' }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-deps
        with:
          gsegutils-deploy-key: ${{ secrets.GSEGUTILS_DEPLOY_KEY }}

      - name: Run pre-commit
        shell: bash
        run: |
          python -m pip install pre-commit
          pre-commit run --all-files

  tests:
    name: Tests (pytest)
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - uses: ./.github/actions/setup-python-deps
        with:
          gsegutils-deploy-key: ${{ secrets.GSEGUTILS_DEPLOY_KEY }}

      - name: Pyright (informational)
        id: pyright
        continue-on-error: true
        uses: jakebailey/pyright-action@v3
        with:
          annotate: warnings
          # NOTE: leave the `warnings` input UNSET — setting it to `true` would
          # ESCALATE warnings to exit 1 (Pitfall 2 in 01-RESEARCH.md). The
          # warn-only semantics come from the step-level continue-on-error flag.
          working-directory: .

      - name: Upload pyright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pyright-report-${{ github.run_id }}
          path: .pyright-report.json
          if-no-files-found: ignore

      - name: Run tests
        run: pytest -m "not benchmark" --cov=pchandler --cov-report=xml

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@8cad3ba95e5920c42f44492e54bc9639cba47959  # v6.0.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build docs (warnings-as-errors)
        run: |
          pip install .[doc]
          sphinx-build -W --keep-going -b html docs/source docs/_build
