[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "pchandler"
#version = "0.2.0"
description = "Short description of PointCloudHandler (pchandler)"
requires-python = ">=3.10"
keywords = ["LiDAR", "Pointclouds"]
license = {text = "Proprietary"}
authors = [
	{name = "Nicholas Meyer"},
	{email = "meyernic@ethz.ch"},
]
dynamic = [
	"version",
	"readme",
]
classifiers = [
	"Programming Language :: Python :: 3"
]
dependencies = [
	"numpy ~= 1.24",
	"plyfile ~= 0.7",
	"laspy[lazrs,laszip] ~= 2.4",
	"typing-extensions ~= 4.9",
	"joblib ~= 1.3",
	"alphashape ~= 1.3",
	"open3d ~= 0.18",
#	"PyYAML ~= 6.0",
#	"omegaconf ~= 2.2",
#	"hydra-core ~= 1.2",
]

[tool.setuptools.dynamic]
version = {attr = "pchandler.__version__"}
readme = {file = ["README.md"]}

[project.urls]
homepage = "https://gseg.igp.ethz.ch/"
documentation = "https://google.com"
#repository = "https://gseg-ethz.github.com/DeSpAn"

#[project.scripts]
#DeSpAn = "DeSpAn.cli:main"

[project.optional-dependencies]
doc = ["sphinx ~= 5.1", "sphinx_rtd_theme"]
dev = ["black ~= 22.10"]
cuda11 = ["cudf-cu11 ~= 24.10", "cuspatial-cu11 ~= 24.10", "cuproj-cu11 ~= 24.10", "cuml-cu11 ~= 24.10", "dask-cudf-cu11 ~= 24.10"]
cuda12 = ["cudf-cu12 ~= 24.10", "cuspatial-cu12 ~= 24.10", "cuproj-cu12 ~= 24.10", "cuml-cu12 ~= 24.10", "dask-cudf-cu12 ~= 24.10"]
