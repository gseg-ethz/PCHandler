[build-system]
requires = ["setuptools", "setuptools_scm"]
build-backend = "setuptools.build_meta"

[project]
name = "pchandler"
description = "Short description of PointCloudHandler (pchandler)"
requires-python = ">=3.10"
keywords = ["LiDAR", "Pointclouds"]
license = {text = "Proprietary"}
authors = [
	{name = "Nicholas Meyer"},
	{email = "meyernic@ethz.ch"},
]
dynamic = [
	"version",
	"readme",
]
classifiers = [
	"Programming Language :: Python :: 3",
	"Programming Language :: Python :: 3.10",
	"Programming Language :: Python :: 3.11",

    "Private :: Do Not Upload" # REMOVE BEFORE FLIGHT -- PyPI will always reject packages with classifiers beginning with Private ::
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
	"numpy ~= 1.24",
	"plyfile ~= 0.7",
	"laspy[lazrs,laszip] ~= 2.4",
	"pye57 ~= 0.4",
	"typing-extensions ~= 4.9",
	"joblib ~= 1.3",
	"alphashape ~= 1.3",
	"open3d ~= 0.18",
	"shapely ~= 2.0",
    "numpy (>=2.2.5,<3.0.0)"
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.group.dev.dependencies]
mypy = "^1.15.0"
pytest = "^8.3.5"
ruff = "^0.11.7"
mkdocs = "^1.6.1"

[tool.ruff]
# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

[tool.setuptools.dynamic]
readme = {file = ["README.md"]}
# Same as Black.
line-length = 88
indent-width = 4

[tool.setuptools_scm]
write_to = "src/pchandler/_version.py"
local_scheme = "no-local-version"
version_scheme = "post-release"

[tool.black]
line-length = 120
target-version = ['py310', 'py311', ]

[tool.ruff.lint]
# Enable Pyflakes (`F`) and a subset of the pycodestyle (`E`)  codes by default.
# Unlike Flake8, Ruff doesn't enable pycodestyle warnings (`W`) or
# McCabe complexity (`C901`) by default.
select = ["E4", "E7", "E9", "F"]
ignore = []

[tool.isort]
profile = "black"
# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

[tool.flake8]
max-line-length = 120
extend-ignore = ["E203", "W503"]
# add plugins, e.g. flake8-bugbear
select = ["B", "C", "E", "F", "W", "T4", "D"]
# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.mypy]
python_version = "3.11"
strict = true
[tool.ruff.format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

[project.urls]
homepage = "https://gseg.igp.ethz.ch/"
documentation = "https://google.com"
repository = "https://github.com/gseg-ethz/PCHandler.git"
Issues = "https://github.com/gseg-ethz/PCHandler/issues"
Changelog = "https://github.com/gseg-ethz/PCHandler/blob/main/CHANGELOG.md"
# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

# Enable auto-formatting of code examples in docstrings. Markdown,
# reStructuredText code/literal blocks and doctests are all supported.
#
# This is currently disabled by default, but it is planned for this
# to be opt-out in the future.
docstring-code-format = false

# Set the line length limit used when formatting code snippets in
# docstrings.
#
# This only has an effect when the `docstring-code-format` setting is
# enabled.
docstring-code-line-length = "dynamic"


[project.optional-dependencies]
doc = ["sphinx ~= 5.1", "sphinx_rtd_theme"]
dev = [
  "black~=23.1",            # formatter
  "isort~=5.12",            # import sorter
  "flake8~=6.0",            # style linter
  "flake8-bugbear",         # best-practice checks
  "flake8-docstrings",      # docstring checks
  "mypy~=1.5",              # static typing
  "pre-commit~=3.4",        # git hooks runner
  "pytest~=7.0",            # test framework
  "coverage~=7.0",          # coverage reporting
]
cuda11 = ["geopandas ~= 1.0", "cudf-cu11 ~= 24.10", "cuspatial-cu11 ~= 24.10", "cuproj-cu11 ~= 24.10",
	"cuml-cu11 ~= 24.10", "dask-cudf-cu11 ~= 24.10"]
cuda12 = ["geopandas ~= 1.0", "cudf-cu12 ~= 24.10", "cuspatial-cu12 ~= 24.10", "cuproj-cu12 ~= 24.10",
	"cuml-cu12 ~= 24.10", "dask-cudf-cu12 ~= 24.10"]
